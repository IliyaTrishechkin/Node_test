<!DOCTYPE html>
<html>
    <head>
        <title>root panel</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #4e73df, #1cc88a);
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #333;
            }

            .container {
                background: white;
                padding: 40px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                text-align: center;
                width: 350px;
            }

            h1 {
                margin-bottom: 20px;
                color: #b5cde2;
            }

            span {
                display: block;
                margin-bottom: 25px;
                font-size: 24px;
                color: #555;
            }

            a {
                display: block;
                text-decoration: none;
                margin: 10px 0;
                padding: 12px;
                border-radius: 10px;
                font-weight: bold;
                transition: 0.3s;
                color: white;
            }

            a:nth-child(3) {
                background: #4e73df;
            }

            a:nth-child(4) {
                background: #1cc88a;
            }

            a:nth-child(5) {
                background: #f6c23e;
            }

            a:hover {
                transform: translateY(-3px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            }

            /* Стиль для кнопки виходу */
            .logout-btn {
                display: block;
                margin-top: 20px;
                padding: 12px;
                border-radius: 10px;
                font-weight: bold;
                text-align: center;
                transition: 0.3s;
                background: #e74a3b;
                color: white;
                text-decoration: none;
                cursor: pointer;
                border: none;
                width: 100%;
                font-size: 16px;
            }

            .logout-btn:hover {
                background: #c0392b;
                transform: translateY(-2px);
            }
        </style>
    </head>
    <body>
        <h1 align="right">Вітаю у панелі розробника!</h1>
        <div align="center" class="container">
            <span>Оберіть категорію для роботи</span><br>
            <a href="add_question.html" class="admin-only">Додати питання</a>
            <a href="add_advice.html" class="admin-only">Додати пораду</a>
            <a href="add_article.html" class="admin-only">Додати статтю</a>
            <button id="logout-btn" class="logout-btn">Вийти з акаунта</button>
        </div>
    </body>
    <script src="script.js"></script>
</html>
